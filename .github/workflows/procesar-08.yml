name: Procesar lote 08
on:
  pull_request:
    branches: [release-estable-v3]
    paths: ['data/p08/**', '.github/workflows/procesar-08.yml']
permissions:
  contents: write
jobs:
  procesar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reconstruir paquete
        run: |
          cat data/p08/00.hex data/p08/01.hex | xxd -r -p > /tmp/a
          cat /tmp/a data/p08/02.txt data/p08/03.txt data/p08/04.txt data/p08/05.txt data/p08/06.txt data/p08/07.txt data/p08/08.txt data/p08/09.txt data/p08/10.txt | base64 -d > /tmp/b.tgz
          echo '504afcc2a5fc7627a5144f16fa0d03f889f60dfafab1be17a9e46ad0a98690a5  /tmp/b.tgz' | sha256sum -c -
          tar -xzf /tmp/b.tgz -C .
      - name: Actualizar y auditar
        run: |
          node scripts/aplicar-microbloque.mjs data/microbloques/saliendo-08.json
          node scripts/auditar-microbloque-contenido.mjs data/microbloques/saliendo-08.json
          node scripts/auditar-microbloque-tecnica.mjs data/microbloques/saliendo-08.json
      - name: Confirmar
        run: |
          rm -rf data/p08 data/s08.bin .github/workflows/procesar-08.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Completar lote 08'
          git push origin HEAD:${{ github.head_ref }}
