name: Validar microbloque Tecnología 05

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/mejorar-una-web-vieja-sin-romperla.html'
      - 'posts/hacer-una-web-estatica-que-cargue-rapido.html'
      - 'posts/hacer-una-pagina-rapida-que-google-pueda-entender.html'
      - 'posts/usar-github-como-taller-de-proyectos.html'
      - 'posts/convertir-conocimientos-informaticos-en-servicios-simples.html'
      - 'data/microbloques/tecnologia-05*.json'
      - '.github/workflows/validar-microbloque-tecnologia-05.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catálogo
        run: |
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-05a.json
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-05b.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/tecnologia-05.json
      - name: Auditar SEO y técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/tecnologia-05.json
      - name: Guardar catálogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catálogo del microbloque Tecnología 05" || echo "Sin cambios"
          git push
