name: Validar microbloque Tecnologia 10

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/ordenar-contrasenas-y-cuentas-sin-caos.html'
      - 'posts/hacer-backups-simples-para-no-perder-tu-trabajo.html'
      - 'posts/usar-prompts-para-planificar-un-negocio-digital.html'
      - 'posts/levantar-un-proyecto-abandonado-con-metodo.html'
      - 'posts/crear-una-rutina-de-mantenimiento-web-semanal.html'
      - 'data/microbloques/tecnologia-10.json'
      - '.github/workflows/validar-microbloque-tecnologia-10.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catalogo
        run: node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-10.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/tecnologia-10.json
      - name: Auditar SEO y tecnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/tecnologia-10.json
      - name: Guardar catalogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catalogo del microbloque Tecnologia 10" || echo "Sin cambios"
          git push
