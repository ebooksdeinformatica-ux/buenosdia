name: Aplicar Saliendo 04

on:
  push:
    branches: [lote-1-tecnologia-real]
    paths:
      - 'data/microbloques/saliendo-04-payload/**'
      - '.github/workflows/aplicar-saliendo-04.yml'

permissions:
  contents: write

jobs:
  aplicar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reconstruir cinco HTML finales
        shell: bash
        run: |
          cat data/microbloques/saliendo-04-payload/part-*.b64 | base64 --decode > /tmp/saliendo-04.tar.gz
          tar -xzf /tmp/saliendo-04.tar.gz -C posts
      - name: Actualizar índice editorial
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('data/microbloques/saliendo-04.json','utf8'));
          const path = 'data/posts.json';
          const posts = JSON.parse(fs.readFileSync(path,'utf8'));
          for (const next of manifest.posts) {
            const index = posts.findIndex(post => post.url === next.url || post.title === next.title);
            if (index >= 0) posts[index] = {...posts[index], ...next};
            else posts.unshift(next);
          }
          posts.sort((a,b) => String(b.date || '').localeCompare(String(a.date || '')));
          fs.writeFileSync(path, JSON.stringify(posts, null, 2) + '\n');
          NODE
      - name: Auditar contenido sin molde repetido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/saliendo-04.json
      - name: Auditar SEO y estructura técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/saliendo-04.json
      - name: Limpiar auxiliares temporales
        shell: bash
        run: |
          rm -rf data/microbloques/saliendo-04-payload
          rm -f data/microbloques/saliendo-04-01a.json data/microbloques/saliendo-04-01b.json
          rm -f data/microbloques/saliendo-04-02a.json data/microbloques/saliendo-04-02b.json data/microbloques/saliendo-04-02c.json
          rm -f data/microbloques/saliendo-04-03a.json data/microbloques/saliendo-04-03b.json data/microbloques/saliendo-04-03c.json
          rm -f data/microbloques/saliendo-04-04a.json data/microbloques/saliendo-04-parte-a.json
          rm -f scripts/generar-saliendo-04.mjs
          rm -f .github/workflows/aplicar-saliendo-04.yml
      - name: Confirmar bloque validado en la rama
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Completar y validar Saliendo 04'
          git push
