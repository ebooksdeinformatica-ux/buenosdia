name: Validar microbloque Tecnología 04

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/usar-la-tecnologia-para-salir-del-estancamiento.html'
      - 'posts/crear-un-sistema-de-trabajo-digital-desde-cero.html'
      - 'posts/transformar-experiencia-vieja-en-contenido-nuevo.html'
      - 'posts/volver-a-vivir-de-internet-sin-nostalgia.html'
      - 'posts/crear-servicios-digitales-simples-para-vender.html'
      - 'data/microbloques/tecnologia-04*.json'
      - '.github/workflows/validar-microbloque-tecnologia-04.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catálogo
        run: |
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-04a.json
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-04b.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/tecnologia-04.json
      - name: Auditar SEO y técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/tecnologia-04.json
      - name: Guardar catálogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catálogo del microbloque Tecnología 04" || echo "Sin cambios"
          git push
