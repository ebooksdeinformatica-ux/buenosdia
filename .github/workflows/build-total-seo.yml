name: Build total buenosdia

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'scripts/generar-150-posts.mjs'
      - 'scripts/recrear-publicaciones-por-intencion.mjs'
      - 'scripts/postprocesar-publicaciones.mjs'
      - 'scripts/preparar-indexacion.mjs'
      - 'scripts/auditar-publicaciones.mjs'
      - '.github/workflows/build-total-seo.yml'

permissions:
  contents: write

jobs:
  build-total:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/generar-150-posts.mjs
      - run: node scripts/recrear-publicaciones-por-intencion.mjs
      - run: node scripts/postprocesar-publicaciones.mjs
      - run: node scripts/preparar-indexacion.mjs
      - run: node scripts/auditar-publicaciones.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preparar indexación y auditar las 300 publicaciones" || echo "Sin cambios"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
