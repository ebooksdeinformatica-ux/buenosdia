name: Control editorial anti-repetición

on:
  push:
    branches: [ main ]
    paths:
      - 'posts/**'
      - 'data/**'
      - 'scripts/**'
      - 'assets/js/**'
      - 'package.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'posts/**'
      - 'data/**'
      - 'scripts/**'
      - 'assets/js/**'
      - 'package.json'

jobs:
  auditar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build SEO estático e interlinks
        run: npm run build
      - name: Auditoría editorial, voz y Statcounter
        run: npm run audit
      - name: Confirmar build limpio
        run: git diff --exit-code
