name: Diagnostico final de calidad

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostico-final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/generar-150-posts.mjs
      - run: node scripts/recrear-publicaciones-por-intencion.mjs
      - run: node scripts/postprocesar-publicaciones.mjs
      - run: node scripts/finalizar-calidad.mjs
      - run: node scripts/preparar-indexacion.mjs
      - run: node scripts/auditar-diagnostico.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: informe-calidad
          path: data/auditoria-publicaciones.json
