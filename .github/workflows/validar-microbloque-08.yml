name: Validar microbloque 08

on:
  pull_request:
    branches: [release-estable-v3]

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catálogo
        run: |
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-08a.json
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-08b.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/tecnologia-08.json
      - name: Auditar SEO y técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/tecnologia-08.json
      - name: Guardar catálogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catálogo del microbloque 08" || echo "Sin cambios"
          git push
