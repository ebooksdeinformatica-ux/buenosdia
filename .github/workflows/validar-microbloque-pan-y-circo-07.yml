name: Validar microbloque Pan y Circo 07

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/opiniones-rapidas-y-pensamiento-lento.html'
      - 'posts/dejar-de-regalar-atencion-por-aburrimiento.html'
      - 'posts/el-ocio-consciente-contra-el-consumo-automatico.html'
      - 'posts/cuando-mirar-todo-te-deja-sin-vivir-nada.html'
      - 'posts/la-industria-de-la-distraccion-cotidiana.html'
      - 'data/microbloques/pan-y-circo-07.json'
      - '.github/workflows/validar-microbloque-pan-y-circo-07.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catalogo
        run: node scripts/aplicar-microbloque.mjs data/microbloques/pan-y-circo-07.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/pan-y-circo-07.json
      - name: Auditar SEO y tecnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/pan-y-circo-07.json
      - name: Guardar catalogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catalogo del microbloque Pan y Circo 07" || echo "Sin cambios"
          git push
