name: Generar 150 publicaciones SEO

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/generar-150-posts.mjs'
      - '.github/workflows/generar-150-posts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generar publicaciones, feed y sitemap
        run: node scripts/generar-150-posts.mjs
      - name: Publicar cambios generados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts data/posts.json sitemap.xml
          git commit -m "Generar 150 publicaciones SEO estáticas" || echo "Sin cambios para publicar"
          git push
