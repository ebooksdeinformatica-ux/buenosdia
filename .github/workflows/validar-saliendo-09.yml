name: Validar Saliendo 09

on:
  push:
    branches: [lote-1-tecnologia-real]
    paths:
      - 'data/p09/**'
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/crear-una-vida-menos-dependiente-del-sistema.html'
      - 'posts/usar-tus-conocimientos-para-rescatarte.html'
      - 'posts/armar-una-agenda-de-supervivencia-creativa.html'
      - 'posts/trabajar-aunque-todavia-no-haya-resultados.html'
      - 'posts/crear-activos-digitales-en-silencio.html'
      - 'data/microbloques/saliendo-09.json'
      - 'data/posts.json'
      - 'scripts/auditar-microbloque-contenido.mjs'
      - 'scripts/auditar-microbloque-tecnica.mjs'
      - '.github/workflows/validar-saliendo-09.yml'

permissions:
  contents: write

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: lote-1-tecnologia-real
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Aplicar paquete si existe
        run: |
          if [ -f data/p09/payload.txt ]; then
            mkdir -p /tmp/s09
            base64 -d data/p09/payload.txt > /tmp/s09/payload.tgz
            tar -xzf /tmp/s09/payload.tgz -C /tmp/s09
            mkdir -p posts data/microbloques
            cp /tmp/s09/saliendo09/*.html posts/
            cp /tmp/s09/saliendo09/saliendo-09.json data/microbloques/saliendo-09.json
          fi
      - name: Refuerzo editorial Saliendo 09
        run: |
          node <<'NODE'
          const fs=require('fs');
          const extras={
            'crear-una-vida-menos-dependiente-del-sistema.html':'<h2>Medir margen sin vender humo</h2><p data-s09-extra="autonomia">Un margen real se nota cuando una decisión deja de depender del susto del día. Puede ser una cuenta entendida, una herramienta aprendida, una compra evitada o una tarea propia terminada. No parece épico, pero cambia el lugar desde donde elegís. La autonomía práctica se junta así: una evidencia chica, después otra, hasta que el sistema ya no tiene todas las llaves de tu semana.</p>',
            'usar-tus-conocimientos-para-rescatarte.html':'<h2>Convertir memoria en entrega</h2><p data-s09-extra="conocimiento">Lo que sabés necesita una forma concreta para poder ayudarte. Una explicación clara, una revisión simple, una plantilla o una página terminada convierten memoria en entrega. Ahí aparece otro tipo de confianza: no la confianza de sentirte listo, sino la de ver una pieza afuera de tu cabeza, corregible, mostrable y capaz de abrir una conversación real.</p>',
            'armar-una-agenda-de-supervivencia-creativa.html':'<h2>Una semana que pueda repetirse</h2><p data-s09-extra="agenda">La agenda sirve cuando puede repetirse sin exigir una personalidad nueva. Una semana posible deja lugar para obligaciones, descanso y una pieza propia. Si todo queda apretado, el plan se vuelve otra carga. Si queda demasiado suelto, el día se escapa. El punto medio es una estructura honesta: pocas tareas cerrables, un horario reconocible y una revisión breve antes de volver a empezar.</p>',
            'trabajar-aunque-todavia-no-haya-resultados.html':'<h2>La paciencia también se diseña</h2><p data-s09-extra="resultados">La paciencia no es quedarse quieto esperando milagros. Es diseñar una ventana donde el trabajo pueda mostrar datos. Durante esa ventana, la tarea es producir, medir y ajustar sin pedirle al primer intento que pague toda la historia. Cuando el período termina, revisás con más frialdad: qué tuvo tracción, qué no se entendió, qué debe cortarse y qué merece otra ronda.</p>',
            'crear-activos-digitales-en-silencio.html':'<h2>Publicar cuando la pieza ya respira</h2><p data-s09-extra="activos">El silencio termina cuando la pieza puede cumplir una función. Una guía debe guiar, una plantilla debe ahorrar tiempo, una página debe explicar, un recurso debe resolver algo. Antes de eso, el taller protege. Después, publicar permite probar. La diferencia importa porque no se trata de esconderse: se trata de no entregar al ruido una idea que todavía necesitaba forma.</p>'
          };
          for(const [file,extra] of Object.entries(extras)){
            const path=`posts/${file}`;
            let html=fs.readFileSync(path,'utf8');
            if(!html.includes('data-s09-extra=')){
              html=html.replace('<section class="faq-box">',`${extra}<section class="faq-box">`);
              fs.writeFileSync(path,html);
            }
          }
          NODE
      - name: Actualizar catálogo desde manifiesto
        run: |
          node <<'NODE'
          const fs=require('fs');
          const manifest=JSON.parse(fs.readFileSync('data/microbloques/saliendo-09.json','utf8'));
          const posts=JSON.parse(fs.readFileSync('data/posts.json','utf8'));
          const urls=new Set(manifest.posts.map(post=>post.url));
          const cleaned=posts.filter(post=>!urls.has(post.url));
          const next=[...manifest.posts,...cleaned];
          fs.writeFileSync('data/posts.json',JSON.stringify(next,null,2)+'\n');
          console.log(`${manifest.name}: catálogo actualizado en memoria.`);
          NODE
      - name: Validar catálogo
        run: |
          node <<'NODE'
          const fs=require('fs');
          const manifest=JSON.parse(fs.readFileSync('data/microbloques/saliendo-09.json','utf8'));
          const posts=JSON.parse(fs.readFileSync('data/posts.json','utf8'));
          const byUrl=new Map(posts.map(post=>[post.url,post]));
          const fields=['title','description','category','date','image','readingTime'];
          const errors=[];
          for(const expected of manifest.posts){
            const current=byUrl.get(expected.url);
            if(!current){errors.push(`${expected.url}: ausente del catálogo`);continue;}
            for(const field of fields)if(current[field]!==expected[field])errors.push(`${expected.url}: ${field} no coincide`);
            if(JSON.stringify(current.tags)!==JSON.stringify(expected.tags))errors.push(`${expected.url}: tags no coinciden`);
          }
          if(errors.length){console.error(errors.join('\n'));process.exit(1);}
          console.log(`${manifest.name}: catálogo correcto para ${manifest.posts.length} artículos.`);
          NODE
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/saliendo-09.json
      - name: Auditar técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/saliendo-09.json
      - name: Confirmar cambios en rama
        if: github.event_name == 'push'
        run: |
          git rm -f data/p09/* || true
          if git diff --quiet; then
            echo "Sin cambios para confirmar."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posts data/microbloques data/posts.json .github/workflows/validar-saliendo-09.yml data/p09 || true
            git commit -m "Cerrar Saliendo 09"
            git push
          fi
