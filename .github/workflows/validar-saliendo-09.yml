name: Validar Saliendo 09

on:
  push:
    branches: [lote-1-tecnologia-real]
    paths:
      - 'data/p09/**'
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/crear-una-vida-menos-dependiente-del-sistema.html'
      - 'posts/usar-tus-conocimientos-para-rescatarte.html'
      - 'posts/armar-una-agenda-de-supervivencia-creativa.html'
      - 'posts/trabajar-aunque-todavia-no-haya-resultados.html'
      - 'posts/crear-activos-digitales-en-silencio.html'
      - 'data/microbloques/saliendo-09.json'
      - 'data/posts.json'
      - 'scripts/auditar-microbloque-contenido.mjs'
      - 'scripts/auditar-microbloque-tecnica.mjs'
      - '.github/workflows/validar-saliendo-09.yml'

permissions:
  contents: write

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: lote-1-tecnologia-real
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Refuerzo editorial Saliendo 09
        run: |
          node <<'NODE'
          const fs=require('fs');
          const extras={
            'crear-una-vida-menos-dependiente-del-sistema.html':'<h2>Medir margen sin vender humo</h2><p data-s09-extra="autonomia">Un margen real se nota cuando una decisi처n deja de depender del susto del d챠a. Puede ser una cuenta entendida, una herramienta aprendida, una compra evitada o una tarea propia terminada. No parece 챕pico, pero cambia el lugar desde donde eleg챠s. La autonom챠a pr찼ctica se junta as챠: una evidencia chica, despu챕s otra, hasta que el sistema ya no tiene todas las llaves de tu semana.</p>',
            'usar-tus-conocimientos-para-rescatarte.html':'<h2>Convertir memoria en entrega</h2><p data-s09-extra="conocimiento">Lo que sab챕s necesita una forma concreta para poder ayudarte. Una explicaci처n clara, una revisi처n simple, una plantilla o una p찼gina terminada convierten memoria en entrega. Ah챠 aparece otro tipo de confianza: no la confianza de sentirte listo, sino la de ver una pieza afuera de tu cabeza, corregible, mostrable y capaz de abrir una conversaci처n real.</p>',
            'armar-una-agenda-de-supervivencia-creativa.html':'<h2>Una semana que pueda repetirse</h2><p data-s09-extra="agenda">La agenda sirve cuando puede repetirse sin exigir una personalidad nueva. Una semana posible deja lugar para obligaciones, descanso y una pieza propia. Si todo queda apretado, el plan se vuelve otra carga. Si queda demasiado suelto, el d챠a se escapa. El punto medio es una estructura honesta: pocas tareas cerrables, un horario reconocible y una revisi처n breve antes de volver a empezar.</p>',
            'trabajar-aunque-todavia-no-haya-resultados.html':'<h2>La paciencia tambi챕n se dise챰a</h2><p data-s09-extra="resultados">La paciencia no es quedarse quieto esperando milagros. Es dise챰ar una ventana donde el trabajo pueda mostrar datos. Durante esa ventana, la tarea es producir, medir y ajustar sin pedirle al primer intento que pague toda la historia. Cuando el per챠odo termina, revis찼s con m찼s frialdad: qu챕 tuvo tracci처n, qu챕 no se entendi처, qu챕 debe cortarse y qu챕 merece otra ronda.</p>',
            'crear-activos-digitales-en-silencio.html':'<h2>Publicar cuando la pieza ya respira</h2><p data-s09-extra="activos">El silencio termina cuando la pieza puede cumplir una funci처n. Una gu챠a debe guiar, una plantilla debe ahorrar tiempo, una p찼gina debe explicar, un recurso debe resolver algo. Antes de eso, el taller protege. Despu챕s, publicar permite probar. La diferencia importa porque no se trata de esconderse: se trata de no entregar al ruido una idea que todav챠a necesitaba forma.</p>'
          };
          for(const [file,extra] of Object.entries(extras)){
            const path=`posts/${file}`;
            let html=fs.readFileSync(path,'utf8');
            if(!html.includes('data-s09-extra=')){
              html=html.replace('<section class="faq-box">',`${extra}<section class="faq-box">`);
              fs.writeFileSync(path,html);
            }
          }
          NODE
      - name: Diagnosticar contenido
        run: |
          node <<'NODE'
          const fs=require('fs');
          const manifest=JSON.parse(fs.readFileSync('data/microbloques/saliendo-09.json','utf8'));
          const banned=['gu챠a pr찼ctica para','puede parecer una idea simple','el problema no suele ser no saber qu챕 hacer','la trampa es creer que necesit찼s cambiar toda tu vida','no hace falta que hoy sea perfecto','definir el punto de partida','una semana suele alcanzar','prueba de siete d챠as','resultado digital verificable'];
          const clean=s=>s.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/&[a-z0-9#]+;/gi,' ').replace(/\s+/g,' ').trim();
          const out=[];
          for(const file of manifest.files){
            const html=fs.readFileSync(`posts/${file}`,'utf8');
            const article=html.match(/<article[^>]*>([\s\S]*?)<\/article>/i)?.[1]||'';
            const visible=clean(article), lower=visible.toLowerCase();
            const desc=html.match(/<meta name="description" content="([^"]+)"/i)?.[1]||'';
            const words=visible.match(/[A-Za-z횁횋횒횙횣횥횗찼챕챠처첬체챰0-9]+/g)||[];
            out.push(`${file}: palabras=${words.length}; desc=${desc.length}`);
            for(const phrase of banned)if(lower.includes(phrase)||desc.toLowerCase().includes(phrase))out.push(`ERROR ${file}: frase prohibida ${phrase}`);
          }
          fs.writeFileSync('data/microbloques/saliendo-09-diagnostico.txt',out.join('\n')+'\n');
          console.log(out.join('\n'));
          NODE
      - name: Guardar diagn처stico previo
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts data/microbloques/saliendo-09-diagnostico.txt
          git commit -m "Diagnosticar Saliendo 09" || true
          git push || true
      - name: Actualizar cat찼logo desde manifiesto
        run: |
          node <<'NODE'
          const fs=require('fs');
          const manifest=JSON.parse(fs.readFileSync('data/microbloques/saliendo-09.json','utf8'));
          const posts=JSON.parse(fs.readFileSync('data/posts.json','utf8'));
          const urls=new Set(manifest.posts.map(post=>post.url));
          const cleaned=posts.filter(post=>!urls.has(post.url));
          fs.writeFileSync('data/posts.json',JSON.stringify([...manifest.posts,...cleaned],null,2)+'\n');
          NODE
      - name: Validar cat찼logo
        run: |
          node <<'NODE'
          const fs=require('fs');
          const manifest=JSON.parse(fs.readFileSync('data/microbloques/saliendo-09.json','utf8'));
          const posts=JSON.parse(fs.readFileSync('data/posts.json','utf8'));
          const byUrl=new Map(posts.map(post=>[post.url,post]));
          const fields=['title','description','category','date','image','readingTime'];
          const errors=[];
          for(const expected of manifest.posts){
            const current=byUrl.get(expected.url);
            if(!current){errors.push(`${expected.url}: ausente del cat찼logo`);continue;}
            for(const field of fields)if(current[field]!==expected[field])errors.push(`${expected.url}: ${field} no coincide`);
            if(JSON.stringify(current.tags)!==JSON.stringify(expected.tags))errors.push(`${expected.url}: tags no coinciden`);
          }
          if(errors.length){console.error(errors.join('\n'));process.exit(1);}
          console.log(`${manifest.name}: cat찼logo correcto para ${manifest.posts.length} art챠culos.`);
          NODE
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/saliendo-09.json
      - name: Auditar t챕cnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/saliendo-09.json
      - name: Confirmar cambios en rama
        if: github.event_name == 'push'
        run: |
          git rm -f data/p09/* || true
          if git diff --quiet; then
            echo "Sin cambios para confirmar."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posts data/microbloques data/posts.json .github/workflows/validar-saliendo-09.yml data/p09 || true
            git commit -m "Cerrar Saliendo 09"
            git push
          fi
