name: Validar microbloque Alimentacion 04

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/la-ansiedad-que-se-disfraza-de-antojo.html'
      - 'posts/rutina-de-comida-para-mente-clara.html'
      - 'posts/menos-paquete-y-mas-energia-real.html'
      - 'posts/alimentarse-para-sostener-trabajo-digital.html'
      - 'posts/la-matrix-del-consumo-alimentario.html'
      - 'data/microbloques/alimentacion-04.json'
      - '.github/workflows/validar-microbloque-alimentacion-04.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catalogo
        run: node scripts/aplicar-microbloque.mjs data/microbloques/alimentacion-04.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/alimentacion-04.json
      - name: Auditar SEO y tecnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/alimentacion-04.json
      - name: Guardar catalogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catalogo del microbloque Alimentacion 04" || echo "Sin cambios"
          git push
