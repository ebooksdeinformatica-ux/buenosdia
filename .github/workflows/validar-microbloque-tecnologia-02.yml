name: Validar microbloque Tecnología 02

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/automatizar-tareas-simples-sin-complicarte.html'
      - 'posts/vender-plantillas-digitales-a-gente-comun.html'
      - 'posts/crear-contenido-sin-depender-de-redes-sociales.html'
      - 'posts/convertir-ideas-sueltas-en-publicaciones-utiles.html'
      - 'posts/usar-ia-para-ordenar-un-proyecto-online.html'
      - 'scripts/aplicar-microbloque-tecnologia-02.mjs'
      - 'scripts/auditar-microbloque-contenido.mjs'
      - 'scripts/auditar-microbloque-tecnica.mjs'
      - 'data/microbloques/tecnologia-02.json'
      - '.github/workflows/validar-microbloque-tecnologia-02.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catálogo
        run: node scripts/aplicar-microbloque-tecnologia-02.mjs
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/tecnologia-02.json
      - name: Auditar SEO y técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/tecnologia-02.json
      - name: Guardar catálogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catálogo del microbloque Tecnología 02" || echo "Sin cambios"
          git push
