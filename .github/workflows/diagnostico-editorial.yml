name: Diagnostico editorial completo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/parchear-reescritor.mjs
      - run: node scripts/mejorar-reescritor-base.mjs
      - run: node scripts/mejorar-reescritor-contexto.mjs
      - run: node scripts/mejorar-faq.mjs
      - run: node scripts/generar-150-posts.mjs
      - run: node scripts/recrear-publicaciones-por-intencion.mjs
      - run: node scripts/postprocesar-publicaciones.mjs
      - run: node scripts/quitar-relleno-antiduplicados.mjs
      - run: node scripts/finalizar-calidad.mjs
      - run: node scripts/finalizar-categorias.mjs
      - run: node scripts/preparar-indexacion.mjs
      - run: node scripts/postprocesar-publicaciones.mjs
      - run: node scripts/auditar-publicaciones-v2.mjs > auditoria-editorial.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: auditoria-editorial-completa
          path: auditoria-editorial.txt
