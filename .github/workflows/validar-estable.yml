name: Revisar pulido estable
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  revisar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Ejecutar pulido
        continue-on-error: true
        run: node scripts/pulir-build-estable.mjs 2>&1 | tee salida-pulido.txt
      - uses: actions/upload-artifact@v4
        with:
          name: salida-pulido
          path: salida-pulido.txt
