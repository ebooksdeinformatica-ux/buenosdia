name: Validar microbloque Tecnología 06

on:
  pull_request:
    branches: [release-estable-v3]
    paths:
      - 'posts/crear-imagenes-web-limpias-y-livianas.html'
      - 'posts/usar-estadisticas-para-decidir-que-publicar.html'
      - 'posts/crear-una-web-liviana-para-adsense.html'
      - 'posts/usar-internet-para-recuperar-ingresos-perdidos.html'
      - 'posts/crear-un-mini-laboratorio-de-seo-casero.html'
      - 'data/microbloques/tecnologia-06*.json'
      - '.github/workflows/validar-microbloque-tecnologia-06.yml'

permissions:
  contents: write

jobs:
  validar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Actualizar catálogo
        run: |
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-06a.json
          node scripts/aplicar-microbloque.mjs data/microbloques/tecnologia-06b.json
      - name: Auditar contenido
        run: node scripts/auditar-microbloque-contenido.mjs data/microbloques/tecnologia-06.json
      - name: Auditar SEO y técnica
        run: node scripts/auditar-microbloque-tecnica.mjs data/microbloques/tecnologia-06.json
      - name: Guardar catálogo validado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git commit -m "Actualizar catálogo del microbloque Tecnología 06" || echo "Sin cambios"
          git push
