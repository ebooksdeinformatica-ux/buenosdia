<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página no encontrada | buenosdia.com</title>
  <meta name="robots" content="noindex,follow">
  <style>:root{--bg:#f6f3ee;--card:#fffdfa;--text:#171717;--muted:#667085;--line:#e7e1d8;--pill:#f5f5f4;--shadow:0 10px 25px rgba(0,0,0,.05);--radius:22px;--max:1100px}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}.wrap{max-width:var(--max);margin:0 auto;padding:28px 20px 70px}header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22px}.brand{text-decoration:none;color:#111827;font-weight:700;font-size:1.2rem}nav a{text-decoration:none;color:var(--muted);margin-left:20px;font-size:1rem}.hero,.card,.post-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.hero{padding:34px;margin-bottom:22px}.hero h1{margin:0 0 12px;font-size:clamp(2rem,5vw,3.5rem);line-height:1.02;letter-spacing:-.05em}.hero p{margin:0;color:#475467;line-height:1.65;font-size:1.08rem}.eyebrow{color:var(--muted);font-size:1rem;margin-bottom:14px}.card{padding:24px}.tag-cloud{display:flex;flex-wrap:wrap;gap:12px}.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--pill);color:#475467;border-radius:999px;padding:10px 14px;font-size:.98rem;text-decoration:none}.tag span{display:inline-block;background:#fff;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:.86rem}.tag.active{background:#111827;color:#fff}.tag.active span{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);color:#fff}.posts-grid{display:grid;gap:18px;margin-top:22px}.post-card{padding:26px}.post-card h2{margin:0 0 10px;font-size:1.45rem;line-height:1.2;letter-spacing:-.03em}.post-card p{margin:0 0 18px;color:#475467;font-size:1.02rem;line-height:1.65}.read-link{text-decoration:none;color:#111827;font-weight:700}.read-link:hover{text-decoration:underline}@media (max-width:800px){header{flex-direction:column}nav a{margin:0 18px 0 0}}</style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="/">buenosdia.com</a>
      <nav>
        <a href="/">Inicio</a>
        <a href="/#publicaciones">Publicaciones</a>
        <a href="/tags/">Etiquetas</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <p class="eyebrow">404</p>
        <h1>Esta página no existe</h1>
        <p id="message">Estamos revisando si el enlace corresponde a una etiqueta con un slug mal formado.</p>
      </section>
      <section class="card">
        <p><a class="read-link" href="/">Volver al inicio</a></p>
      </section>
    </main>
  </div>
  <script>
    const knownTagVariants = {"cansancio":"cansancio","agotamiento":"agotamiento","dormir-y-seguir-cansado":"dormir-y-seguir-cansado","sueno-acumulado":"sueno-acumulado","fatiga-mental":"fatiga-mental","mananas-pesadas":"mananas-pesadas","falta-de-energia":"falta-de-energia","buenos-dias-reales":"buenos-dias-reales","cansancio-emocional":"cansancio-emocional","despertar-sin-ganas":"despertar-sin-ganas","amigos":"amigos","soledad":"soledad","abandono":"abandono","decepcion":"decepcion","noches-dificiles":"noches-dificiles","seguir-adelante":"seguir-adelante","vinculos-reales":"vinculos-reales","buenos-dias":"buenos-dias","mananas-tristes":"mananas-tristes","presencia-emocional":"presencia-emocional","amistad":"amistad","emociones":"emociones","dia-de-lluvia":"dia-de-lluvia","lluvia-y-emociones":"lluvia-y-emociones","reflexion-de-buenos-dias":"reflexion-de-buenos-dias","calma-interior":"calma-interior","tristeza":"tristeza","paz-interior":"paz-interior","mananas-grises":"mananas-grises","sentirse-en-paz":"sentirse-en-paz","esperar":"esperar","incertidumbre":"incertidumbre","dias-dificiles":"dias-dificiles","paciencia":"paciencia","pausa-en-la-vida":"pausa-en-la-vida","resistencia-emocional":"resistencia-emocional","fuerza-interior":"fuerza-interior","levantar-proyectos":"levantar-proyectos","empezar-de-nuevo":"empezar-de-nuevo","reconstruccion-personal":"reconstruccion-personal","volver-a-empezar":"volver-a-empezar","motivacion-real":"motivacion-real","proyectos-caidos":"proyectos-caidos","mananas-dificiles":"mananas-dificiles","proyectos":"proyectos","reconstruccion":"reconstruccion","motivacion":"motivacion","esperanza":"esperanza","manana-feliz":"manana-feliz","problemas-de-la-vida":"problemas-de-la-vida","empezar-el-dia":"empezar-el-dia"};
    const message = document.getElementById('message');

    function slugify(str) {
      return String(str || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, ' ')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    const path = window.location.pathname || '/';
    const tagMatch = path.match(/^\/tags\/(.+?)(?:\.html)?$/i);
    if (tagMatch) {
      const decoded = decodeURIComponent(tagMatch[1]);
      const candidate = slugify(decoded);
      const canonical = knownTagVariants[candidate];
      if (canonical) {
        message.textContent = 'Redirigiendo a la etiqueta correcta…';
        window.location.replace('/tags/' + canonical + '.html');
      }
    }
  </script>
</body>
</html>
